version: 2

models:
  - name: int_order_items_enriched
    description: "Order items joined to product, category, and seller attributes. Grain: order_id + order_item_id."

  - name: int_order_items_by_order
    description: "Order-item measures aggregated to one row per order."
    columns:
      - name: order_id
        data_tests: [unique, not_null]

  - name: int_payments_by_order
    description: "Payments aggregated to one row per order."
    columns:
      - name: order_id
        data_tests: [unique, not_null]

  - name: int_reviews_by_order
    description: "Reviews aggregated to one row per order (handles duplicate reviews)."
    columns:
      - name: order_id
        data_tests: [unique, not_null]
